name: "JaCoCo line covered ratio (from the pom.xml)"

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read

jobs:
  jacoco_coverage_report:
    name: JaCoCo coverage report
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: 'temurin'
          java-version: '25'
          check-latest: true
          cache: 'maven'
      - name: Install Xvfb
        run: sudo apt-get install -y xvfb
      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
      - name: Test
        run: mvn test -f pom.xml

      - name: Install libxml2-utils
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Generate Coverage Summary
        if: always()
        run: |
          # Utilisation de string() pour capturer tout le texte de la cellule
          # On nettoie les espaces insécables et virgules avec tr/sed
          RAW_MISSED=$(xmllint --html --xpath 'string(//tfoot/tr/td[8])' target/site/jacoco/index.html 2>/dev/null | tr -d '[:space:],')
          RAW_TOTAL=$(xmllint --html --xpath 'string(//tfoot/tr/td[9])' target/site/jacoco/index.html 2>/dev/null | tr -d '[:space:],')

          # Nettoyage forcé pour ne garder que les chiffres
          MISSED=$(echo "$RAW_MISSED" | grep -oE '[0-9]+' | head -1)
          TOTAL_LINES=$(echo "$RAW_TOTAL" | grep -oE '[0-9]+' | head -1)

          if [ -z "$MISSED" ] || [ -z "$TOTAL_LINES" ]; then
            echo "::error::Extraction des données échouée. Vérifiez le chemin xpath."
            exit 1
          fi

          COVERED=$((TOTAL_LINES - MISSED))
          PERCENT=$(( (COVERED * 100) / TOTAL_LINES ))

          {
            echo "### JaCoCo Code Coverage Report"
            echo "| Indicateur | Valeur |"
            echo "| --- | ---: |"
            echo "| Code Coverage % | **$PERCENT %** |"
            echo "| :heavy_check_mark: Lignes couvertes | $COVERED |"
            echo "| :x: Lignes manquées | $MISSED |"
            echo "| Total lignes | $TOTAL_LINES |"
          } >> $GITHUB_STEP_SUMMARY

          if [ "$PERCENT" -lt 80 ]; then
            echo "::error::Coverage is $PERCENT%, below 80%."
            exit 1
          fi
